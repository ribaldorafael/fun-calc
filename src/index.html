<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fun Calc</title>
  <link rel="stylesheet" href="style.css?v=4" />
</head>
<body>

  <!-- ============ THEME SELECT MENU ============ -->
  <div id="menu" class="menu">
    <div class="menu-title">
      <span class="menu-title-text">CHOOSE YOUR CALCULATOR</span>
      <div class="menu-subtitle">each one is a different experience</div>
    </div>
    <div class="menu-grid" id="menu-grid"></div>
  </div>

  <!-- ============ CALCULATOR (PixiJS canvas goes here) ============ -->
  <div id="calc-screen" class="calc-screen hidden">
    <button class="back-btn" id="back-btn">&larr; BACK</button>
    <div id="canvas-container" class="canvas-container"></div>
  </div>

  <!-- PixiJS from CDN -->
  <script src="https://cdn.jsdelivr.net/npm/pixi.js@7.3.3/dist/pixi.min.js"></script>

  <!-- Engine (pure logic, no DOM) -->
  <script src="engine.js?v=4"></script>

  <!-- Audio -->
  <script src="audio.js?v=4"></script>

  <!-- PixiJS theme base class -->
  <script src="pixi-base.js?v=4"></script>

  <!-- Themes -->
  <script src="theme-matrix.js?v=4"></script>
  <script src="theme-odonto.js?v=4"></script>
  <script src="theme-dragon.js?v=4"></script>

  <!-- App (menu + orchestration) -->
  <script src="app.js?v=4"></script>
</body>
</html>
